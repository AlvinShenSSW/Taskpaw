[package]
name = "taskpaw"
version = "3.0.0"
description = "TaskPaw V3 desktop shell"
authors = ["TaskPaw"]
edition = "2021"

[lib]
name = "taskpaw_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
