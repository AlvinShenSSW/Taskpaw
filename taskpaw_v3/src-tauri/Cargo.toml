[package]
name = "taskpaw"
version = "3.0.0"
description = "TaskPaw V3 desktop shell"
authors = ["TaskPaw"]
edition = "2021"

# Desktop binary-only crate (the entry point is src/main.rs). No [lib] target —
# declaring one without a src/lib.rs would break cargo build/check.

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
