name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Let a newer push cancel an in-flight run on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint + test (py${{ matrix.python-version }} · ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.12"]
        # Windows is the PRIMARY agent target (#143), so run the suite there too —
        # a single cheap entry (latest supported py) to catch path-separator /
        # encoding / process-handling regressions. Packaging (#126) stays separate.
        include:
          - os: windows-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Verify lockfile is up to date
        run: uv lock --check

      - name: Sync dev environment
        run: uv sync --group dev --python ${{ matrix.python-version }}

      - name: Run tests (with V3 coverage report; no hard threshold yet)
        run: uv run --python ${{ matrix.python-version }} pytest --cov=taskpaw_v3 --cov-report=term-missing

  frontend:
    name: frontend build (V3 UI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install + test + build the V3 UI
        working-directory: taskpaw_v3/ui
        run: |
          npm ci
          npm test
          npm run build

  shell:
    name: tauri shell (cargo test) + backend bundling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: astral-sh/setup-uv@v7
      - name: Linux webkit deps (tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev
      - name: Build backend sidecar (verifies the PyInstaller spec + places it for cargo)
        run: |
          uv sync --frozen --extra build --extra v3
          uv run python scripts/build.py --skip-tauri
      - name: "cargo test (shell logic — loopback validation, role)"
        working-directory: taskpaw_v3/src-tauri
        run: cargo test --locked

  # A REAL `tauri build` (#54): exercises externalBin resolution, the role/version
  # --config overrides, and packaging on every PR — which the shell job's
  # --skip-tauri never does. Linux .deb only (no AppImage tooling); not uploaded.
  bundle-smoke:
    name: bundle smoke (Linux tauri build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Linux webkit deps (tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev
      - name: Install Python + build deps
        run: uv sync --frozen --extra build --extra v3
      - name: tauri build (sidecar + UI + .deb)
        env:
          TASKPAW_BUNDLE_TARGETS: deb
        run: uv run python scripts/build.py
      - name: Verify a .deb bundle was produced
        run: |
          ls -la taskpaw_v3/src-tauri/target/release/bundle/deb/*.deb
