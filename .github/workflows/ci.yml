name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Let a newer push cancel an in-flight run on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint + test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Verify lockfile is up to date
        run: uv lock --check

      - name: Sync dev environment
        run: uv sync --group dev --python ${{ matrix.python-version }}

      - name: Run tests
        run: uv run --python ${{ matrix.python-version }} pytest

  frontend:
    name: frontend build (V3 UI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install + build the V3 UI
        working-directory: taskpaw_v3/ui
        run: |
          npm ci
          npm run build

  shell:
    name: tauri shell (cargo test) + backend bundling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: astral-sh/setup-uv@v7
      - name: Linux webkit deps (tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev
      - name: Build backend sidecar (verifies the PyInstaller spec + places it for cargo)
        run: |
          uv sync --frozen --extra build --extra v3
          uv run python scripts/build.py --skip-tauri
      - name: "cargo test (shell logic — loopback validation, role)"
        working-directory: taskpaw_v3/src-tauri
        run: cargo test --locked
